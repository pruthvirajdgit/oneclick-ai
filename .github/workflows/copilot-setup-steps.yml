name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: oneclick
                    POSTGRES_PASSWORD: devpassword
                    POSTGRES_DB: oneclick_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U oneclick"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5

            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: "1.94"
                  components: clippy, rustfmt

            - name: Cache Cargo registry and build artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      backend/target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: Build the workspace
              working-directory: backend
              run: cargo build --workspace

            - name: Run unit tests
              working-directory: backend
              run: cargo test --workspace

            - name: Run integration tests
              working-directory: backend
              env:
                  DATABASE_URL: postgres://oneclick:devpassword@localhost:5432/oneclick_test
                  REDIS_URL: redis://localhost:6379
                  JWT_SECRET: test-jwt-secret-for-ci-only
                  INTERNAL_SECRET: test-internal-secret-for-ci-only
                  GROQ_API_KEY: gsk_test_placeholder
              run: cargo test --workspace --features integration -- --test-threads=1
