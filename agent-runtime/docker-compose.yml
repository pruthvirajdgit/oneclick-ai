# =============================================================================
# OneClick.ai — Single Agent (Local Development)
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and add your OpenRouter API key
#   2. docker compose up -d
#   3. Agent gateway runs on ws://localhost:3000
# =============================================================================

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oneclick-agent
    restart: unless-stopped
    tty: true
    ports:
      - "${AGENT_PORT:-3000}:3000"
    volumes:
      # Persist OpenClaw state (config, sessions, memory) across restarts
      - agent-state:/home/node/.openclaw
      # Persist workspace (agent's working files)
      - agent-workspace:/home/node/workspace
      # Mount local docs folder (put your PDFs/TXTs here)
      - ./docs:/data/docs:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENT_MODEL=${AGENT_MODEL:-openrouter/auto}
      - AGENT_NAME=${AGENT_NAME:-Assistant}
      - AGENT_SYSTEM_PROMPT=${AGENT_SYSTEM_PROMPT:-You are a helpful AI assistant.}
      - AGENT_DOCS_PATH=/data/docs
      - AGENT_PORT=3000
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-oneclick-local-dev}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - TZ=${TZ:-Asia/Kolkata}
      - NODE_OPTIONS=--max-old-space-size=1280
    mem_limit: ${AGENT_MEMORY_LIMIT:-2048m}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "sh", "-c", "HOME=/home/node openclaw health --timeout 8000 2>/dev/null; exit 0"]
      interval: 60s
      timeout: 15s
      start_period: 60s
      retries: 5

volumes:
  agent-state:
  agent-workspace:
