services:
  frontend:
    build: ./frontend
    container_name: oneclick-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "3000:80"
    networks:
      - oneclick-net
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-oneclick}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-oneclick}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENT_IMAGE=${AGENT_IMAGE:-oneclick-agent:latest}
      - AGENT_MEMORY_LIMIT=${AGENT_MEMORY_LIMIT:-512m}
      - AGENT_CPU_LIMIT=${AGENT_CPU_LIMIT:-0.5}
      - MAX_AGENTS=${MAX_AGENTS:-100}
      - FREE_TIER_DAILY_LIMIT=${FREE_TIER_DAILY_LIMIT:-50}
      - IDLE_TIMEOUT_MINUTES=${IDLE_TIMEOUT_MINUTES:-15}
      - DOCKER_NETWORK=oneclick-net
      - INTERNAL_SECRET=${INTERNAL_SECRET:?Set INTERNAL_SECRET in .env}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - RUST_LOG=${RUST_LOG:-oneclick_backend=debug,tower_http=debug}
    volumes:
      # WARNING: Docker socket grants root-equivalent host access. In production,
      # use a socket proxy (e.g. Tecnativa/docker-socket-proxy) to limit API calls.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oneclick-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-oneclick}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
      - POSTGRES_DB=${POSTGRES_DB:-oneclick}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneclick}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oneclick-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oneclick-net
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  oneclick-net:
    name: oneclick-net
    driver: bridge
